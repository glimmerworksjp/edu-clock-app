<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f0e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Futatoki" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="canonical" href="https://play.futatoki.app/" />
    <!-- PWA manifest は vite-plugin-pwa が自動注入する(/manifest.webmanifest = 英語)。
         日本語ブラウザでは下の inline script が ja 版 manifest と
         apple-mobile-web-app-title を差し替える。manifest link は <head> 末尾に
         注入されるため、DOMContentLoaded で確実に参照できるタイミングで swap する。 -->
    <script>
      (function () {
        var lang = (navigator.language || "").toLowerCase();
        if (!lang.startsWith("ja")) return;
        var swap = function () {
          var link = document.querySelector('link[rel="manifest"]');
          if (link) link.href = "/manifest.ja.webmanifest";
          var title = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (title) title.setAttribute("content", "フタトキ");
        };
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", swap);
        } else {
          swap();
        }
      })();
    </script>
    <title>こどもの時計｜フタトキアプリ</title>

    <!-- 検索結果スニペット用。description を未指定だと Googlebot が文字盤の数字
         (1〜12, 1〜60) を本文として拾ってしまうため、必ず明示する。
         "フタトキ時計" / "Futatoki the Clock" のブランド本体は LP (futatoki.app) に
         持たせ、アプリ側はあくまで「アプリ版」としてポジションを下げる。
         JS 実行できる UA では I18nProvider が各 locale 値で上書きするため、
         ここの ja static はクローラ向けデフォルト。 -->
    <meta name="description" content="詳しい使い方や教え方は futatoki.app で紹介中。フタトキ時計のアプリ版。" />

    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="フタトキアプリ" />
    <meta property="og:title" content="こどもの時計｜フタトキアプリ" />
    <meta property="og:description" content="詳しい使い方や教え方は futatoki.app で紹介中。フタトキ時計のアプリ版。" />
    <meta property="og:url" content="https://play.futatoki.app/" />
    <meta property="og:image" content="https://play.futatoki.app/og.png" />
    <meta property="og:image:width" content="1180" />
    <meta property="og:image:height" content="820" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="こどもの時計｜フタトキアプリ" />
    <meta name="twitter:description" content="詳しい使い方や教え方は futatoki.app で紹介中。フタトキ時計のアプリ版。" />
    <meta name="twitter:image" content="https://play.futatoki.app/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
